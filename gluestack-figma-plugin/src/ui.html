<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gluestack Design System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      padding: 20px;
      min-height: 100vh;
      font-size: 13px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .dot {
      width: 8px; height: 8px;
      background: linear-gradient(135deg,#6366f1,#a855f7);
      border-radius: 50%;
      box-shadow: 0 0 8px #6366f1;
    }
    .header h1 { font-size: 14px; font-weight: 700; letter-spacing: -0.02em; }
    .header span { font-size: 11px; color: #64748b; margin-left: auto; }

    .section { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    textarea {
      width: 100%;
      height: 120px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #e2e8f0;
      font-family: monospace;
      font-size: 11px;
      padding: 10px 12px;
      resize: vertical;
      outline: none;
    }
    textarea:focus { border-color: #6366f1; }
    textarea::placeholder { color: #475569; }

    .toggles {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      padding: 10px 14px;
    }
    .toggle-row input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: #6366f1;
      cursor: pointer;
    }
    .toggle-row .toggle-label {
      font-size: 13px;
      color: #e2e8f0;
      font-weight: 500;
    }
    .toggle-row .toggle-desc {
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
    }
    .toggle-info { display: flex; flex-direction: column; }

    .btn-row { display: flex; gap: 10px; }
    .btn-primary {
      flex: 1;
      padding: 11px 16px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg,#6366f1,#a855f7);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-secondary {
      padding: 11px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #94a3b8;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.08); color: #e2e8f0; }

    .log-box {
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 10px 12px;
      font-family: monospace;
      font-size: 11px;
      color: #94a3b8;
      max-height: 160px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .log-line { line-height: 1.5; }
    .log-line.success { color: #4ade80; }
    .log-line.error { color: #f87171; }

    .stats {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }
    .stat {
      flex: 1;
      background: rgba(99,102,241,0.1);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }
    .stat-val { font-size: 20px; font-weight: 800; color: #a5b4fc; }
    .stat-key { font-size: 10px; color: #64748b; margin-top: 2px; }

    .hint {
      font-size: 11px;
      color: #475569;
      line-height: 1.6;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .hint strong { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="header">
    <div class="dot"></div>
    <h1>Gluestack Design System</h1>
    <span>v2.0</span>
  </div>

  <div class="section">
    <label>Paste Design System JSON</label>
    <textarea
      id="json-input"
      placeholder='Paste JSON from the /figma page (or use "Copy to Clipboard" button)…'
    ></textarea>
  </div>

  <div class="toggles">
    <div class="toggle-row">
      <input type="checkbox" id="toggle-variables" checked />
      <div class="toggle-info">
        <span class="toggle-label">Create Variables</span>
        <span class="toggle-desc">Color + Spacing Figma Variables from tokens</span>
      </div>
    </div>
    <div class="toggle-row">
      <input type="checkbox" id="toggle-components" checked />
      <div class="toggle-info">
        <span class="toggle-label">Create Components</span>
        <span class="toggle-desc">Component sets with all variant combinations</span>
      </div>
    </div>
  </div>

  <div class="btn-row" style="margin-bottom:16px">
    <button class="btn-primary" id="btn-import">⚡ Import Design System</button>
    <button class="btn-secondary" id="btn-close">✕</button>
  </div>

  <div class="section" id="log-section" style="display:none">
    <label>Progress</label>
    <div class="log-box" id="log-box"></div>
  </div>

  <div class="stats" id="stats-section" style="display:none">
    <div class="stat">
      <div class="stat-val" id="stat-components">—</div>
      <div class="stat-key">Components</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-tokens">—</div>
      <div class="stat-key">Tokens</div>
    </div>
  </div>

  <div class="hint" style="margin-top:16px">
    <strong>How to get the JSON:</strong> Open the Gluestack website at <code>/figma</code>,
    click <em>Copy to Clipboard</em>, then paste here and click Import.
  </div>
</body>
</html>
